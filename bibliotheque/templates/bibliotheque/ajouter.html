<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un livre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">➕ Ajouter un livre</h1>
        
        <div class="card p-4 shadow">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Titre du livre</label>
                    <input type="text" name="titre" class="form-control" 
                           placeholder="Ex: Le Petit Prince" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Auteur</label>
                    <input type="text" name="auteur" class="form-control" 
                           placeholder="Ex: Antoine de Saint-Exupéry" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Prix (DT)</label>
                    <input type="number" name="prix" class="form-control" 
                           placeholder="Ex: 15.5" step="0.1" min="0" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" name="disponible" class="form-check-input" 
                           id="disponible" checked>
                    <label class="form-check-label" for="disponible">Disponible</label>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">✅ Ajouter</button>
                    <a href="{% url 'liste_livres' %}" class="btn btn-secondary">🔙 Retour</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
